[[processors.starlark]]
  namepass = ["aruba_instant_clients"]
  source = '''
HEX = "0123456789abcdef"

def apply(metric):
    idx = metric.tags.get("index")
    if idx == None:
        return metric
    parts = idx.split(".")
    if len(parts) != 6:
        return metric
    octets = []
    for p in parts:
        n = int(p)
        octets.append(HEX[n // 16] + HEX[n % 16])
    metric.tags["mac"] = ":".join(octets)
    metric.tags.pop("index")
    return metric
'''
